name: Release Wrapper

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Optional release title. Defaults to the tag."
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  build-windows-wrapper:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "64"
      CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"
      CARGO_PROFILE_RELEASE_STRIP: "symbols"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release-wrapper
          cache-on-failure: true

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_RELEASE_TAG}"
            name="${INPUT_RELEASE_NAME}"
          else
            tag="${GITHUB_REF_NAME}"
            name=""
          fi

          if [[ -z "${tag}" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi

          if [[ -z "${name}" ]]; then
            name="${tag}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Build release wrapper
        run: cargo build --locked --release --bin hermes-windows-sandbox-wrapper

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: target/release/hermes-windows-sandbox-wrapper.exe
